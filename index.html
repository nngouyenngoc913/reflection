<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nancy Nguyen | Chat Reflection</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .chat-bubble { max-width: 85%; animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .typing-dot { width: 6px; height: 6px; background: #94a3b8; border-radius: 50%; animation: bounce 1.4s infinite ease-in-out; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
    </style>
</head>
<body class="bg-slate-50 h-screen flex flex-col font-sans overflow-hidden">

    <header class="bg-white border-b border-slate-200 px-6 py-4 flex justify-between items-center shrink-0 z-10 shadow-sm">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-blue-600 rounded-full flex items-center justify-center text-white font-bold shadow-lg">NN</div>
            <div>
                <h1 class="text-sm font-bold leading-none uppercase tracking-tight">Nancy Nguyen</h1>
                <span class="text-[10px] text-green-500 font-bold uppercase tracking-widest">Digital Reflection Active</span>
            </div>
        </div>
        <div class="flex gap-4">
            <input type="password" id="api-key" placeholder="OpenAI Key for AI Mode" 
                   class="hidden md:block text-xs p-2 border border-slate-200 rounded-lg outline-none focus:border-blue-500 w-48 transition-all">
        </div>
    </header>

    <main id="chat-window" class="flex-1 overflow-y-auto p-4 md:p-8 space-y-6">
        <div class="chat-bubble bg-white p-4 rounded-2xl rounded-tl-none border border-slate-100 shadow-sm text-slate-700">
            Chào bạn! I'm Nancy's Digital Reflection. 👋
        </div>
        <div class="chat-bubble bg-white p-4 rounded-2xl rounded-tl-none border border-slate-100 shadow-sm text-slate-700">
            I demonstrate the <strong>Flow of Work</strong>—a gallery of automation systems, communication tools, and strategic reflections born from my experience in Accounting & Ops.
        </div>
        
        <div class="flex flex-wrap gap-2 chat-bubble" id="main-menu">
            <button onclick="showWork()" class="px-4 py-2 bg-blue-50 text-blue-600 rounded-full text-xs font-bold border border-blue-100 hover:bg-blue-600 hover:text-white transition">I. Technical Solutions</button>
            <button onclick="showReflection()" class="px-4 py-2 bg-blue-50 text-blue-600 rounded-full text-xs font-bold border border-blue-100 hover:bg-blue-600 hover:text-white transition">II. Flow of Reflection</button>
            <button onclick="showContact()" class="px-4 py-2 bg-blue-50 text-blue-600 rounded-full text-xs font-bold border border-blue-100 hover:bg-blue-600 hover:text-white transition">III. Collaboration</button>
        </div>
    </main>

    <footer class="p-4 bg-white border-t border-slate-200 shrink-0">
        <div class="max-w-4xl mx-auto flex gap-4">
            <input type="text" id="user-input" placeholder="Ask about AR Reconciliation, Python, or n8n..." 
                   class="flex-1 p-3 bg-slate-100 border-none rounded-xl outline-none focus:ring-2 focus:ring-blue-500 text-sm transition-all"
                   onkeypress="if(event.key === 'Enter') handleInput()">
            <button onclick="handleInput()" class="bg-blue-600 text-white px-6 py-2 rounded-xl font-bold text-sm hover:bg-blue-700 shadow-md transition">Send</button>
        </div>
    </footer>

    <script>
        const chatWindow = document.getElementById('chat-window');

        // --- DATA: FLOW OF WORK ---
        const projectData = [
            { title: "Invoice Extraction", desc: "Python-based ledger automation for bulk invoice processing.", video: "DA8bWbdnMV8", tag: "Python" },
            { title: "Communication App", desc: "Systematic structure for professional English clarity.", video: "4uZQ1sfjzUA", tag: "App" },
            { title: "Email Tracking & IFRS", desc: "n8n Agentic system mapping mail flow to IFRS standards.", video: "3UvaXQvPZXQ", tag: "n8n" }
        ];

        // --- DATA: FLOW OF REFLECTION ---
        const blogPosts = [
            { title: "KPMG Tax Case Study", url: "https://trangtaichinhketoan.substack.com/p/kpmg-tax-case-study", content: "Analysis of complex tax risk management and finalization cases.", date: "15/05/2024" },
            { title: "Ledger Logic", url: "https://trangtaichinhketoan.substack.com/p/ledger-logic", content: "The logic behind double-entry systems and scientific ledger control.", date: "10/05/2024" },
            { title: "AI Improvement", url: "https://trangtaichinhketoan.substack.com/p/ai-improvement", content: "Using AI to optimize Excel data and financial report analysis.", date: "05/05/2024" },
            { title: "Dictionary for Fun", url: "https://trangtaichinhketoan.substack.com/p/dictionary-for-fun", content: "Accounting English (IFRS/VAS) simplified with a humorous twist.", date: "01/05/2024" }
        ];

        // --- CORE UI ---
        function addMessage(content, isUser = false) {
            const div = document.createElement('div');
            div.className = isUser ? 'flex justify-end' : 'flex justify-start';
            div.innerHTML = `
                <div class="chat-bubble ${isUser ? 'bg-blue-600 text-white rounded-tr-none shadow-md' : 'bg-white text-slate-700 rounded-tl-none border border-slate-100 shadow-sm'} p-4 rounded-2xl">
                    ${content}
                </div>
            `;
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function showTyping() {
            const div = document.createElement('div');
            div.id = 'typing';
            div.innerHTML = `<div class="chat-bubble bg-white p-4 rounded-2xl rounded-tl-none border border-slate-100 flex gap-1"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>`;
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        // --- NAVIGATION ACTIONS ---
        function showWork() {
            addMessage("I'd like to see your Technical Solutions.", true);
            showTyping();
            setTimeout(() => {
                document.getElementById('typing').remove();
                addMessage("Here is my <strong>Technical Solution Gallery</strong>. These represent my thoughts on automating core finance operations:");
                let grid = `<div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-2">`;
                projectData.forEach(p => {
                    grid += `
                        <div class="bg-slate-50 p-3 rounded-xl border border-slate-200">
                            <iframe class="w-full aspect-video rounded-lg mb-2 shadow-sm" src="https://www.youtube.com/embed/${p.video}" frameborder="0" allowfullscreen></iframe>
                            <p class="font-bold text-xs text-blue-600 uppercase tracking-tighter">${p.tag}</p>
                            <p class="font-bold text-sm text-slate-800">${p.title}</p>
                            <p class="text-[10px] text-slate-500 mt-1">${p.desc}</p>
                        </div>
                    `;
                });
                grid += `</div>`;
                addMessage(grid);
            }, 800);
        }

        function showReflection() {
            addMessage("Show me your Flow of Reflection.", true);
            showTyping();
            setTimeout(() => {
                document.getElementById('typing').remove();
                addMessage("These are my published insights on Substack, covering Tax, Ledger Logic, and AI:");
                let list = `<div class="flex flex-col gap-3 mt-2">`;
                blogPosts.forEach(post => {
                    list += `
                        <a href="${post.url}" target="_blank" class="block p-4 bg-white border border-slate-200 rounded-xl hover:border-blue-500 hover:shadow-md transition-all group">
                            <span class="text-[10px] font-bold text-slate-400 uppercase">${post.date}</span>
                            <h3 class="font-bold text-sm text-slate-900 group-hover:text-blue-600">${post.title}</h3>
                            <p class="text-[11px] text-slate-500 mt-1 line-clamp-2">${post.content}</p>
                        </a>
                    `;
                });
                list += `</div>`;
                addMessage(list);
            }, 800);
        }

        function showContact() {
            addMessage("How can we collaborate?", true);
            setTimeout(() => {
                addMessage("Nancy is currently active in the <strong>Freelance market</strong> and happy to connect! These projects are reflections of her professional experience—designed to show her achievements and strategic thinking. <br><br>Feel free to reach out via LinkedIn or your preferred freelancing platform.");
            }, 500);
        }

        // --- CHAT LOGIC ---
        async function handleInput() {
            const input = document.getElementById('user-input');
            const apiKey = document.getElementById('api-key').value;
            const text = input.value.trim();
            if (!text) return;

            addMessage(text, true);
            input.value = '';

            if (apiKey) {
                showTyping();
                try {
                    const res = await fetch('https://api.openai.com/v1/chat/completions', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
                        body: JSON.stringify({
                            model: "gpt-3.5-turbo",
                            messages: [
                                {role: "system", content: "You are Nancy Nguyen's Portfolio AI. Nancy is an Ops & Automation Specialist (AR Reconciliation, Ledger, Python, n8n). Her site 'Reflection' shows conceptual yet real-world projects based on her work experience. Be concise and professional."},
                                {role: "user", content: text}
                            ]
                        })
                    });
                    const data = await res.json();
                    document.getElementById('typing').remove();
                    addMessage(data.choices[0].message.content);
                } catch (err) {
                    document.getElementById('typing').remove();
                    addMessage("My AI connection is a bit unstable. Please check your API key!");
                }
            } else {
                addMessage("To unlock my full AI chat capabilities, please enter an OpenAI Key in the header. Otherwise, use the menu above to explore my work!");
            }
        }
    </script>
</body>
</html>
